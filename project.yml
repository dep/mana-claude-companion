name: ClaudeCompanion
options:
  bundleIdPrefix: com.pecknology
  deploymentTarget:
    macOS: "13.0"
targets:
  ClaudeCompanion:
    type: application
    platform: macOS
    sources:
      - ClaudeCompanion
    settings:
      base:
        PRODUCT_NAME: ClaudeCompanion
        PRODUCT_BUNDLE_IDENTIFIER: com.pecknology.ClaudeCompanion
        INFOPLIST_FILE: ClaudeCompanion/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClaudeCompanion/Resources/ClaudeCompanion.entitlements
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    resources:
      - path: ClaudeCompanion/Resources
        buildPhase: resources
